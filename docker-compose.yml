version: "3.8"
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: inmoflow
      POSTGRES_USER: inmoflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inmoflow_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  pgdata:
